apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: conformancechecks.cherenkov.io
spec:
  group: cherenkov.io
  names:
    kind: ConformanceCheck
    listKind: ConformanceCheckList
    plural: conformancechecks
    shortNames:
    - cck
    singular: conformancecheck
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - specURL
            - targetURL
            properties:
              specURL:
                type: string
                description: URL of the OpenAPI specification to validate against
              targetURL:
                type: string
                description: URL of the target service to validate
              schedule:
                type: string
                description: Optional cron schedule for periodic validation
              llmConcurrency:
                type: integer
                minimum: 1
                maximum: 16
                description: Maximum number of concurrent LLM tasks
              device_targets:
                type: array
                description: List of device targets for mobile/browser validation
                items:
                  type: object
                  required:
                  - device_id
                  - platform
                  properties:
                    device_id:
                      type: string
                      description: Unique identifier for the device
                    platform:
                      type: string
                      description: Device platform (ios, android, web)
                    device_class:
                      type: string
                      description: Optional device class (phone, tablet, desktop)
              visual_config:
                type: object
                description: Visual regression testing configuration
                properties:
                  vlm_tier:
                    type: string
                    description: VLM tier to use for visual comparison
                  expected_screenshots:
                    type: object
                    description: Map of endpoint to expected screenshot path
                    additionalProperties:
                      type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Running, Pass, Fail, Error]
                description: Current phase of the conformance check
              lastRun:
                type: string
                format: date-time
                description: Timestamp of the last validation run
              results:
                type: array
                description: List of test results from the last run
                items:
                  type: object
                  properties:
                    endpoint:
                      type: string
                    method:
                      type: string
                    status:
                      type: string
                    device_id:
                      type: string
                    screenshot:
                      type: string
              conditions:
                type: array
                description: Status conditions for the conformance check
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                      enum: ["True", "False", "Unknown"]
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
