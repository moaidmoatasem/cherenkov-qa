apiVersion: v1
kind: Namespace
metadata:
  name: cherenkov-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cherenkov-operator
  namespace: cherenkov-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: cherenkov-operator
  template:
    metadata:
      labels:
        control-plane: cherenkov-operator
    spec:
      serviceAccountName: cherenkov-operator
      containers:
        - name: operator
          image: localhost:5000/cherenkov/operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MAX_CONCURRENT_LLM_TASKS
              value: "2"
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
            requests:
              cpu: "0.1"
              memory: 64Mi
