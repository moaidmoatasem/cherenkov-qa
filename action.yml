name: CHERENKOV Conformance Check
description: >
  Generate and run API conformance tests from your OpenAPI spec.
  Catches spec drift before it reaches production.
author: Moayed Badawy

branding:
  icon: shield
  color: blue

inputs:
  spec:
    description: Path to OpenAPI spec file (YAML or JSON)
    required: true
  target:
    description: API server URL to test against
    required: true
  fail-on-drift:
    description: Exit with code 1 if any conformance violations are found
    required: false
    default: "true"
  llm-provider:
    description: LLM provider (openai | ollama)
    required: false
    default: openai
  llm-model:
    description: Model name (e.g. gpt-4o-mini, qwen2.5-coder:7b)
    required: false
    default: gpt-4o-mini
  output-format:
    description: Output format (json | sarif | junit | html)
    required: false
    default: sarif
  output-path:
    description: Path for the output report file
    required: false
    default: cherenkov-report.sarif

outputs:
  violations:
    description: Number of conformance violations found
    value: ${{ steps.run.outputs.violations }}
  report-path:
    description: Path to the generated conformance report
    value: ${{ steps.run.outputs.report-path }}
  sarif-path:
    description: Path to SARIF output (for GitHub Security tab)
    value: ${{ steps.run.outputs.sarif-path }}
  drift-detected:
    description: true if any conformance violations were found
    value: ${{ steps.run.outputs.drift-detected }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install CHERENKOV
      shell: bash
      run: pip install -e . --quiet

    - name: Run conformance check
      id: run
      shell: bash
      env:
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        CHERENKOV_LLM_PROVIDER: ${{ inputs.llm-provider }}
        CHERENKOV_LLM_MODEL: ${{ inputs.llm-model }}
      run: |
        set +e
        OUTPUT_FILE="${{ inputs.output-path }}"
        FORMAT="${{ inputs.output-format }}"
        cherenkov validate \
          --spec "${{ inputs.spec }}" \
          --target "${{ inputs.target }}" \
          --output "${OUTPUT_FILE}" \
          --format "${FORMAT}" \
          --json-summary /tmp/cherenkov-summary.json
        VIOLATIONS=0
        DRIFT_DETECTED=false
        if [ -f /tmp/cherenkov-summary.json ]; then
          VIOLATIONS=$(python3 -c "import json; print(json.load(open('/tmp/cherenkov-summary.json')).get('violation_count',0))" 2>/dev/null || echo 0)
          [ "${VIOLATIONS}" -gt 0 ] && DRIFT_DETECTED=true
        fi
        echo "violations=${VIOLATIONS}" >> "$GITHUB_OUTPUT"
        echo "drift-detected=${DRIFT_DETECTED}" >> "$GITHUB_OUTPUT"
        echo "report-path=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
        [ "${FORMAT}" = "sarif" ] && echo "sarif-path=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
        printf "CHERENKOV: %s violation(s) detected.\n" "${VIOLATIONS}"
        if [ "${{ inputs.fail-on-drift }}" = "true" ] && [ "${DRIFT_DETECTED}" = "true" ]; then
          echo "Failing build (fail-on-drift=true)."; exit 1
        fi
