name: 'Cherenkov QA Conformance Test'
description: 'Runs Cherenkov QA API conformance tests and uploads SARIF results'
author: 'Moaid Moatasem'
inputs:
  spec_path:
    description: 'Path to OpenAPI or GraphQL spec'
    required: true
  target_url:
    description: 'Target API URL to test against'
    required: true
  source_type:
    description: 'Type of spec (openapi or graphql)'
    required: false
    default: 'openapi'
  format:
    description: 'Output format (json, text, sarif)'
    required: false
    default: 'sarif'
  output_path:
    description: 'Path for output report'
    required: false
    default: 'cherenkov_report.sarif'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: stub/package-lock.json

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        cd stub && npm ci && cd ..
      shell: bash

    - name: Run Cherenkov
      run: |
        python cherenkov.py validate \
          --spec ${{ inputs.spec_path }} \
          --target ${{ inputs.target_url }} \
          --source ${{ inputs.source_type }} \
          --format ${{ inputs.format }} \
          --output ${{ inputs.output_path }}
      shell: bash

    - name: Upload SARIF results to GitHub Security
      if: ${{ inputs.format == 'sarif' && always() }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output_path }}
        category: cherenkov-conformance

branding:
  icon: 'check-circle'
  color: 'blue'
