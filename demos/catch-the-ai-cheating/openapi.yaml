openapi: 3.0.0
info:
  title: Orders API (demo oracle)
  version: "1.0"
paths:
  /orders/{id}:
    get:
      summary: Get an order by id
      responses:
        "200":
          description: The order
          content:
            application/json:
              schema:
                type: object
                required: [id, total, status]
                properties:
                  id:
                    type: integer
                  total:
                    type: number
                  status:
                    type: string
                    enum: [paid, pending]
        "404":
          description: Not found
