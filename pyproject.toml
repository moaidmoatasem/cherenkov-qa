[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cherenkov"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic==2.7.1",
    "requests",
    "pyyaml",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["cherenkov*"]
