# .gitlab-ci-template.yml
# Include this template in your GitLab pipeline to run CHERENKOV-QA API conformance tests.
# Ensure your target API is running before this job executes, or start it in `before_script`.

stages:
  - api-conformance

cherenkov-validate:
  stage: api-conformance
  image: mcr.microsoft.com/playwright/python:v1.49.0-jammy
  variables:
    OPENAPI_SPEC_PATH: "./openapi.yaml"
    TARGET_URL: "http://localhost:8080"
  script:
    - pip install cherenkov-qa
    - cherenkov init
    # Run tests and fail the pipeline if divergence is detected
    - cherenkov validate --spec $OPENAPI_SPEC_PATH --target $TARGET_URL --fail-on-drift
  after_script:
    # Always generate standard reports even if validation failed
    - cherenkov report --format junit --output cherenkov-junit.xml
    - cherenkov report --format sarif --output cherenkov-results.sarif
  artifacts:
    when: always
    paths:
      - cherenkov-results.sarif
    reports:
      junit: cherenkov-junit.xml
