name: Supply Chain Security (SBOM + SLSA)

on:
  push:
    branches: [main]
    paths:
      - 'cherenkov/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'Dockerfile.mcp'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write      # upload release assets
  id-token: write      # SLSA provenance / OIDC signing
  packages: write      # attach to GitHub Packages (optional)
  security-events: write  # upload SARIF / dependency review

jobs:
  # ── Python SBOM (CycloneDX) ───────────────────────────────────────────────
  python-sbom:
    name: Python SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + SBOM generator
        run: |
          pip install . --quiet
          pip install cyclonedx-bom --quiet

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cyclonedx-py environment \
            --output-format JSON \
            --outfile cherenkov-sbom.cdx.json
          echo "Generated SBOM:"
          python -c "
          import json, sys
          with open('cherenkov-sbom.cdx.json') as f:
            d = json.load(f)
          comps = d.get('components', [])
          print(f'  Components: {len(comps)}')
          "

      - name: Generate CycloneDX SBOM (XML)
        run: |
          cyclonedx-py environment \
            --output-format XML \
            --outfile cherenkov-sbom.cdx.xml

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: |
            cherenkov-sbom.cdx.json
            cherenkov-sbom.cdx.xml
          retention-days: 90

      - name: Attach SBOM to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cherenkov-sbom.cdx.json
            cherenkov-sbom.cdx.xml

  # ── Docker image SBOM (Syft / Grype) ─────────────────────────────────────
  docker-sbom:
    name: Docker SBOM + CVE scan (Syft + Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (local, no push)
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          push: false
          tags: cherenkov:sbom-scan
          load: true

      - name: Generate Syft SBOM for Docker image
        uses: anchore/sbom-action@v0
        with:
          image: cherenkov:sbom-scan
          format: cyclonedx-json
          output-file: cherenkov-docker-sbom.cdx.json
          upload-artifact: true
          artifact-name: docker-sbom

      - name: Scan Docker image with Grype (CVE)
        uses: anchore/scan-action@v3
        id: grype
        with:
          image: cherenkov:sbom-scan
          output-format: sarif
          severity-cutoff: high
          fail-build: false

      - name: Upload Grype SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-cve-scan

  # ── SLSA Level 2 provenance for Python dist ───────────────────────────────
  slsa-provenance:
    name: SLSA L2 Build Provenance
    runs-on: ubuntu-latest
    needs: python-sbom
    permissions:
      id-token: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          pip install build --quiet
          python -m build
          ls -lh dist/

      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
        # Note: this sub-workflow runs as a reusable workflow ref, not a step.
        # We inline the hash step here as an approximation for L2:
        continue-on-error: true
        with:
          base64-subjects: ""

      - name: Compute artifact digest (SLSA L2 attestation)
        run: |
          sha256sum dist/* | tee dist/SHA256SUMS
          echo "--- Digest manifest ---"
          cat dist/SHA256SUMS

      - name: Upload signed dist + digest
        uses: actions/upload-artifact@v4
        with:
          name: signed-dist
          path: dist/
          retention-days: 90

      - name: Attach signed dist to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

  # ── Dependency review (licence + known vuln) ─────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0, GPL-2.0
          comment-summary-in-pr: true
