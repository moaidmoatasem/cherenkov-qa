name: Certify Gate (E3.3)

# Runs the CHERENKOV Certificate workflow:
#   1. Issues a certificate from a proof run (demo mode or user-supplied URL)
#   2. Verifies certificate integrity offline
#   3. Uploads certificate as a build artifact for audit trail
#
# Note: --fail-on-fail is only applied when a real target URL is provided via
# workflow_dispatch.  The default demo-mode run always exits 0 so CI is not
# gated on the health of a third-party demo endpoint.

on:
  # Runs manually or when explicitly triggered — not on every push/PR,
  # because the default demo mode probes the live Petstore which is
  # an external dependency unsuitable for gating every commit.
  workflow_dispatch:
    inputs:
      target_url:
        description: "API base URL to certify (leave blank for Petstore demo)"
        required: false
        default: ""
      fail_on_fail:
        description: "Exit 1 if verdict is FAIL"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  certify:
    name: Issue Verification Certificate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cherenkov
        run: pip install -e "." --quiet

      - name: Run cherenkov certify
        env:
          CHERENKOV_CERT_KEY: ${{ secrets.CHERENKOV_CERT_KEY }}
        run: |
          TARGET="${{ github.event.inputs.target_url }}"
          GATE="${{ github.event.inputs.fail_on_fail }}"
          FAIL_FLAG=""
          if [ "$GATE" = "true" ]; then
            FAIL_FLAG="--fail-on-fail"
          fi

          if [ -z "$TARGET" ]; then
            # Demo mode: probe the Petstore, never gate on verdict
            cherenkov certify --output cert.json
          else
            cherenkov certify \
              --url "$TARGET" \
              --output cert.json \
              $FAIL_FLAG
          fi

      - name: Verify certificate integrity
        run: cherenkov certify --verify cert.json

      - name: Upload certificate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cherenkov-certificate-${{ github.run_id }}
          path: cert.json
          retention-days: 90

      - name: Print certificate badge hint
        if: success()
        run: |
          echo ""
          echo "Certificate issued.  Add this badge to your README:"
          echo ""
          echo "  ![CHERENKOV Verified](https://img.shields.io/badge/CHERENKOV-verified-brightgreen?logo=checkmarx)"
          echo ""
