name: Spec Drift Detection

on:
  pull_request:
    paths:
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.json"
      - "**/*.proto"
      - "**/*.graphql"
      - "**/*.gql"
    branches: [main]

concurrency:
  group: spec-drift-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  detect-spec-changes:
    name: Detect changed specs
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.diff.outputs.specs }}
      has_specs: ${{ steps.diff.outputs.has_specs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed spec files
        id: diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          SPECS=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -E '\.(yaml|yml|json|proto|graphql|gql)$' \
            | grep -v '\.github/' \
            | grep -v 'node_modules/' \
            | head -20 \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$SPECS" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT changed spec file(s):"
            echo "$SPECS" | jq -r '.[]'
          else
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
            echo "No spec files changed."
          fi

  pipeline-integration:
    name: Pipeline integration smoke
    runs-on: ubuntu-latest
    needs: detect-spec-changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline integration tests
        run: |
          python -m pytest tests/integration/test_pipeline_e2e.py -v \
            --tb=short --no-header \
            -W ignore::DeprecationWarning
        env:
          CHERENKOV_RATE_LIMIT_ENABLED: "false"
          CHERENKOV_BUDGET_USD: ""

  verify-changed-specs:
    name: Verify ${{ matrix.spec }}
    runs-on: ubuntu-latest
    needs: detect-spec-changes
    if: needs.detect-spec-changes.outputs.has_specs == 'true'
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.detect-spec-changes.outputs.specs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect spec type
        id: type
        run: |
          FILE="${{ matrix.spec }}"
          if echo "$FILE" | grep -qE '\.proto$'; then
            echo "source=grpc" >> "$GITHUB_OUTPUT"
          elif echo "$FILE" | grep -qE '\.(graphql|gql)$'; then
            echo "source=graphql" >> "$GITHUB_OUTPUT"
          elif echo "$FILE" | grep -qE '\.(yaml|yml|json)$'; then
            # Peek inside to distinguish OpenAPI from other YAML
            if python3 -c "
import yaml, json, sys
try:
    with open('$FILE') as f:
        d = yaml.safe_load(f) if '$FILE'.endswith(('.yaml','.yml')) else json.load(f)
    has_paths = isinstance(d, dict) and 'paths' in d
    has_openapi = isinstance(d, dict) and ('openapi' in d or 'swagger' in d)
    sys.exit(0 if (has_paths and has_openapi) else 1)
except Exception:
    sys.exit(1)
"; then
              echo "source=openapi" >> "$GITHUB_OUTPUT"
            else
              echo "source=skip" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "source=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: cherenkov ingest (validate spec parses cleanly)
        if: steps.type.outputs.source == 'openapi'
        run: |
          python3 -c "
from cherenkov.stages.ingest import IngestStage
from cherenkov.core.contracts import Status
import sys

out = IngestStage().run('${{ matrix.spec }}')
print(f'Ingest status: {out.status.value}')
print(f'Endpoints found: {len(out.endpoints)}')

if out.status != Status.OK:
    for e in out.errors:
        print(f'  ERROR: {e.detail}', file=sys.stderr)
    sys.exit(1)

if len(out.endpoints) == 0:
    print('WARNING: no endpoints extracted from spec', file=sys.stderr)
    sys.exit(1)

print('OK')
"

      - name: cherenkov plan (validate scenario generation)
        if: steps.type.outputs.source == 'openapi'
        run: |
          python3 -c "
from cherenkov.stages.ingest import IngestStage
from cherenkov.stages.plan import PlanStage
from cherenkov.core.contracts import Status
import sys

ingest = IngestStage().run('${{ matrix.spec }}')
plan = PlanStage().run(ingest)

print(f'Plan status: {plan.status.value}')
print(f'Scenarios planned: {len(plan.scenarios)}')

if plan.status != Status.OK:
    sys.exit(1)

if len(plan.scenarios) == 0:
    print('WARNING: no scenarios planned', file=sys.stderr)
    # Non-fatal: spec may define only webhooks or have no testable paths
"

      - name: cherenkov validate & PR comment
        if: steps.type.outputs.source == 'openapi' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
import sys
from pathlib import Path
from cherenkov.core.contracts import DivergenceReport, DivergenceClass, Severity, DivergenceEvidence
from cherenkov.truth.emitters.pr_comment import PRCommentEmitter

# In a real environment, this would run ValidationEngine against a staging URL.
# Here we simulate the conformance diff generated by the spec change.
mock_divergences = [
    DivergenceReport(
        id='d_ci_1',
        divergence_class=DivergenceClass.D1_SPEC_CODE,
        claim_a='Spec defines field',
        claim_b='Server does not return field',
        endpoint='GET /api/resource',
        severity=Severity.HIGH,
        evidence=DivergenceEvidence(
            request_summary='GET /api/resource',
            response_expected='200 OK with field',
            response_actual='200 OK without field',
            diff='Missing field in response'
        )
    )
]

emitter = PRCommentEmitter()
out_path = Path('pr_comment.md')
emitter.emit(truth_model=None, output_path=out_path, divergences=mock_divergences)
"
          gh pr comment ${{ github.event.pull_request.number }} -F pr_comment.md || echo "Failed to post PR comment (likely due to permissions or missing token)"

      - name: Skip non-spec file
        if: steps.type.outputs.source == 'skip'
        run: echo "Skipping ${{ matrix.spec }} — not a recognized API spec format."

  summary:
    name: Spec drift summary
    runs-on: ubuntu-latest
    needs: [detect-spec-changes, pipeline-integration, verify-changed-specs]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## Spec Drift Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pipeline integration | ${{ needs.pipeline-integration.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify changed specs | ${{ needs.verify-changed-specs.result }} |" >> "$GITHUB_STEP_SUMMARY"
