name: Desktop Build (Tauri 2)

on:
  push:
    branches: [main, develop]
    paths:
      - "desktop/**"
  pull_request:
    paths:
      - "desktop/**"

jobs:
  build:
    name: Cargo build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev || true

      # tauri-build validates that the externalBin sidecar exists at compile
      # time. This smoke job only checks that the Rust code compiles, so a
      # stub stands in for the real PyInstaller launcher (built and bundled
      # by build-desktop.yml at release time).
      - name: Create placeholder sidecar
        shell: bash
        working-directory: desktop/src-tauri
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/^host: //p')
          EXT=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then EXT=".exe"; fi
          mkdir -p binaries
          printf '#!/bin/sh\nexit 0\n' > "binaries/cherenkov-launcher-${TRIPLE}${EXT}"
          chmod +x "binaries/cherenkov-launcher-${TRIPLE}${EXT}"

      - name: Check
        working-directory: desktop/src-tauri
        run: cargo check
