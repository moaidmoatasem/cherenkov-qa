name: CHERENKOV Conformance Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run CHERENKOV
        uses: cherenkov-qa/action@v1
        with:
          openapi-spec-path: './path/to/openapi.yaml'
          target-url: 'http://localhost:8000'
