name: CHERENKOV Behavioral Diff
on:
  pull_request:
    paths:
      - "cherenkov/**"
      - "*.yaml"
      - "*.yml"
      - "*.json"

jobs:
  behavioral-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CHERENKOV
        continue-on-error: true
        run: pip install -e . || pip install pydantic requests PyYAML structlog websockets 2>/dev/null || true

      - name: Get base spec
        run: |
          git show HEAD~1:stripe_spec.json > /tmp/base_spec.json 2>/dev/null || true

      - name: Run behavioral diff
        continue-on-error: true
        run: |
          python3 -c "
          from cherenkov.continuity.pr_diff_action import run_pr_diff
          import os, sys
          base = '/tmp/base_spec.json' if os.path.exists('/tmp/base_spec.json') else None
          pr = 'stripe_spec.json' if os.path.exists('stripe_spec.json') else None
          if base is None or pr is None:
              print('WARNING: One or both spec files missing — skipping behavioral diff')
              sys.exit(0)  # skip with success, but don't post a fake report
          run_pr_diff(base_spec=base, pr_spec=pr, output_path='pr_diff_report.md')
          "

      - name: Post PR comment
        if: hashFiles('pr_diff_report.md') != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('pr_diff_report.md')) { return; }
            const body = fs.readFileSync('pr_diff_report.md', 'utf8');
            if (!body.trim()) { return; }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
