name: CHERENKOV Behavioral Diff
on:
  pull_request:
    paths:
      - "cherenkov/**"
      - "*.yaml"
      - "*.yml"
      - "*.json"

jobs:
  behavioral-diff:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pydantic requests PyYAML structlog websockets 2>/dev/null || true

      - name: Install CHERENKOV (optional)
        run: pip install -e . 2>/dev/null || true

      - name: Get base spec
        run: git show HEAD~1:stripe_spec.json > /tmp/base_spec.json 2>/dev/null || true

      - name: Run behavioral diff
        run: |
          python3 -c "
          import os, sys
          base = '/tmp/base_spec.json' if os.path.exists('/tmp/base_spec.json') else None
          pr   = 'stripe_spec.json'   if os.path.exists('stripe_spec.json')   else None
          if base is None or pr is None:
              print('WARNING: spec file(s) missing — skipping behavioral diff')
              sys.exit(0)
          try:
              from cherenkov.continuity.pr_diff_action import run_pr_diff
              run_pr_diff(base_spec=base, pr_spec=pr, output_path='pr_diff_report.md')
          except Exception as e:
              print(f'WARNING: behavioral diff failed ({e}) — skipping')
              sys.exit(0)
          " 2>&1 || true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('pr_diff_report.md')) {
              console.log('No diff report — skipping comment');
              return;
            }
            const body = fs.readFileSync('pr_diff_report.md', 'utf8').trim();
            if (!body) {
              console.log('Empty diff report — skipping comment');
              return;
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
