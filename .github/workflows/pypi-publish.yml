name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual upload)"
        type: boolean
        default: false

jobs:
  pypi-publish:
    name: Publish cherenkov-qa to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cherenkov-qa/
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        if: ${{ !inputs.dry-run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed if configured.
        # Fallback: set PYPI_API_TOKEN secret and use:
        #   with:
        #     password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Dry-run summary
        if: ${{ inputs.dry-run }}
        run: |
          echo "DRY RUN: Would publish the following to PyPI:"
          ls -lh dist/
