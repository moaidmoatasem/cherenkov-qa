name: Cherenkov Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Cherenkov conformance
        uses: ./
        with:
          spec_path: stub/openapi_3_1.yaml
          target_url: http://localhost:8000
          format: sarif
          mode: full
