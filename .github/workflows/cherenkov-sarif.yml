name: Cherenkov QA Conformance

on:
  workflow_dispatch:

jobs:
  cherenkov-qa:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Start API Server
      run: |
        # Replace with the command to start your API Server
        echo "Starting API Server..."
        # e.g., npm run start &
        # sleep 5

    - name: Run Cherenkov Validation
      uses: ./
      with:
        spec: 'openapi.yaml'
        target: 'http://localhost:3000'
        output-format: 'sarif'
        output-path: 'cherenkov_results.sarif'

    - name: Upload SARIF to GitHub Security Data
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'cherenkov_results.sarif'
        category: 'cherenkov-qa'
