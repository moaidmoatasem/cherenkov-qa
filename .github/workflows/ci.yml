name: CI — Invariant Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:        # manual trigger for the opt-in live-LLM job

jobs:
  docs-drift-gate:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run docs-drift checker
        run: PYTHONPATH=. python3 scripts/ci_docs_check.py

  healing-invariant:
    name: Healing Suggest-Only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run healing smoke test
        run: PYTHONPATH=. python3 smoke_test_healing.py

  polish-invariant:
    name: CLI Help + Docs Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run polish smoke test
        run: PYTHONPATH=. python3 smoke_test_polish.py

  certification-gate:
    name: E12 Certification Gate (C11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run certification smoke test
        run: PYTHONPATH=. python3 smoke_test_certification.py

  governance-kpi:
    name: E12 Governance KPI (C12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run governance smoke test
        run: PYTHONPATH=. python3 smoke_test_governance.py

  copilot-e10:
    name: E10 Explorer + Copilot (C8-C10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt httpx

      - name: Run E10 copilot unit tests
        run: PYTHONPATH=. python3 -m unittest test_copilot_e10.py

      - name: Run E10 copilot smoke test
        run: PYTHONPATH=. python3 smoke_test_copilot_e10.py

  ai-interface-unit:
    name: AI InferenceClient Seam (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run InferenceClient interface unit tests
        run: PYTHONPATH=. python3 -m unittest test_inference_client.py

  docker-build-check:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t cherenkov:ci .


  # ── X3 (#132): CI runners for env-dependent smokes ────────────────────────
  # Provisions node/npm/playwright so smoke_test_eject.py can run the
  # ejected Playwright suite natively (previously skipped on plain runners).
  smoke-eject-node:
    name: Eject + Playwright E2E (node/npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python (for cherenkov CLI + target API) ──
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn

      # ── Node.js (for npm install + npx playwright inside ejected suite) ──
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install Playwright + Chromium browser binaries system-wide so that
      # the ejected suite's `npx playwright test` can find them.
      - name: Install Playwright CLI + Chromium
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      # Set up the target API's own venv (smoke_test_eject starts it via .venv/bin/uvicorn)
      - name: Set up target API venv
        run: |
          if [ -d target ]; then
            python -m venv target/.venv
            target/.venv/bin/pip install --upgrade pip fastapi uvicorn pydantic==2.7.1
          fi

      - name: Run eject smoke test (E2E Playwright)
        # Hosted runners advertise IPv6 routes they can't actually reach, so
        # npm's registry fetch inside the ejected suite died with
        # `connect ENETUNREACH <ipv6>:443`. Force IPv4-first DNS resolution
        # for every node/npm subprocess spawned during the eject + install.
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          PYTHONPATH=. python3 smoke_test_eject.py

  # Provisions k6 so smoke_test_perf.py can run a real load-test pass
  # (previously the k6-missing path was tolerated as HITL/skip).
  smoke-perf-k6:
    name: Perf Baseline (k6 load test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn

      # Install k6 from the official Grafana/k6 apt repository.
      # Fetch the signing key over HTTPS and dearmor it directly — the previous
      # `gpg --keyserver` approach failed on hosted runners with
      # `keyserver receive failed: No dirmngr` (no dirmngr / no ~/.gnupg).
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
               | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Verify k6 installation
        run: k6 version

      # Set up the target API venv (smoke_test_perf starts it via .venv/bin/uvicorn)
      - name: Set up target API venv
        run: |
          if [ -d target ]; then
            python -m venv target/.venv
            target/.venv/bin/pip install --upgrade pip fastapi uvicorn pydantic==2.7.1
          fi

      - name: Run perf baseline smoke test
        run: PYTHONPATH=. python3 smoke_test_perf.py

  # ── Opt-in: the ONE job that exercises the real model ──────────────────────
  # Hosted GitHub runners have no GPU and cannot run qwen2.5-coder:7b, so this is
  # NOT part of the default PR gate. It runs only on manual dispatch and requires a
  # self-hosted runner labelled [self-hosted, gpu] with Ollama + the model present.
  # Without such a runner the job simply stays queued/never starts — it never gives
  # a false green. This is the honest CI answer to "is the core generate path tested
  # end-to-end?": yes, here, on real hardware — not faked on a CPU runner.
  live-llm-generate:
    name: Live LLM Generate (self-hosted GPU, opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pydantic==2.7.1 requests

      - name: Verify Ollama + model present
        run: |
          curl -fsS http://localhost:11434/api/tags | grep -q "qwen2.5-coder" \
            || { echo "qwen2.5-coder model not pulled on this runner"; exit 1; }

      - name: Run live generate smoke (real model -> compilable test)
        env:
          CHERENKOV_LIVE_LLM: "1"
        run: PYTHONPATH=. python3 smoke_test_generate_live.py
