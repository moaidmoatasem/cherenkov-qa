name: CI — Invariant Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:        # manual trigger for the opt-in live-LLM job

jobs:
  docs-drift-gate:
    name: Documentation Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run docs-drift checker
        run: PYTHONPATH=. python3 scripts/ci_docs_check.py

  healing-invariant:
    name: Healing Suggest-Only
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run healing smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_healing.py

  polish-invariant:
    name: CLI Help + Docs Gate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps

      - name: Run polish smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_polish.py

  certification-gate:
    name: E12 Certification Gate (C11)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run certification smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_certification.py

  governance-kpi:
    name: E12 Governance KPI (C12)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run governance smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_governance.py

  copilot-e10:
    name: E10 Explorer + Copilot (C8-C10)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt httpx

      - name: Run E10 copilot unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_copilot_e10.py

      - name: Run E10 copilot smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_copilot_e10.py

  ai-interface-unit:
    name: AI InferenceClient Seam (unit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run InferenceClient interface unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_inference_client.py

  docker-build-check:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cherenkov:ci .

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -r requirements.txt mypy types-requests types-PyYAML
      - name: Run mypy
        run: |
          mypy cherenkov/ --ignore-missing-imports --no-strict-optional \
            --exclude 'cherenkov/web/ui' \
            --exclude 'cherenkov/desktop'
  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -e . 2>/dev/null || true
      - name: Run tests with coverage
        env:
          CHERENKOV_ENV: development
        run: |
          pytest tests/ --cov=cherenkov --cov-report=term-missing \
            --cov-report=xml:coverage.xml -q \
            --cov-fail-under=70 \
            --ignore=tests/test_legacy_visual.py \
            --ignore=tests/test_legacy_deep_healing.py
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── X3 (#132): CI runners for env-dependent smokes ────────────────────────
  # Provisions node/npm/playwright so smoke_test_eject.py can run the
  # ejected Playwright suite natively (previously skipped on plain runners).
  smoke-eject-node:
    name: Eject + Playwright E2E (node/npm)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # ── Python (for cherenkov CLI + target API) ──
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn

      # ── Node.js (for npm install + npx playwright inside ejected suite) ──
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Install Playwright + Chromium browser binaries system-wide so that
      # the ejected suite's `npx playwright test` can find them.
      - name: Install Playwright CLI + Chromium
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      # Set up the target API's own venv (smoke_test_eject starts it via .venv/bin/uvicorn)
      - name: Set up target API venv
        run: |
          if [ -d target ]; then
            python -m venv target/.venv
            target/.venv/bin/pip install --upgrade pip fastapi uvicorn pydantic==2.7.1
          fi

      - name: Run eject smoke test (E2E Playwright)
        # Hosted runners advertise IPv6 routes they can't actually reach, so
        # npm's registry fetch inside the ejected suite died with
        # `connect ENETUNREACH <ipv6>:443`. Force IPv4-first DNS resolution
        # for every node/npm subprocess spawned during the eject + install.
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          PYTHONPATH=. python3 tests/smoke/smoke_test_eject.py

  # Provisions k6 so smoke_test_perf.py can run a real load-test pass
  # (previously the k6-missing path was tolerated as HITL/skip).
  smoke-perf-k6:
    name: Perf Baseline (k6 load test)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn

      # Install k6 from the official Grafana/k6 apt repository.
      # Fetch the signing key over HTTPS and dearmor it directly — the previous
      # `gpg --keyserver` approach failed on hosted runners with
      # `keyserver receive failed: No dirmngr` (no dirmngr / no ~/.gnupg).
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
               | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Verify k6 installation
        run: k6 version

      # Set up the target API venv (smoke_test_perf starts it via .venv/bin/uvicorn)
      - name: Set up target API venv
        run: |
          if [ -d target ]; then
            python -m venv target/.venv
            target/.venv/bin/pip install --upgrade pip fastapi uvicorn pydantic==2.7.1
          fi

      - name: Run perf baseline smoke test
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_perf.py

  # ── Validate smoke: CLI validate command against the target API ─────────────
  validate-smoke:
    name: Validate CLI Smoke (E2E against target API)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt fastapi uvicorn

      # Node.js + Playwright are needed because cherenkov validate runs npx playwright test
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Playwright CLI + Chromium
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      # Install stub npm packages (openapi-fetch, @playwright/test) so the
      # committed test fixtures can be compiled and executed by the validator.
      - name: Install stub npm packages
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm install --prefix stub

      # Set up the target API venv (smoke_test_validate starts it via .venv/bin/uvicorn)
      - name: Set up target API venv
        run: |
          if [ -d target ]; then
            python -m venv target/.venv
            target/.venv/bin/pip install --upgrade pip fastapi uvicorn pydantic==2.7.1
          fi

      - name: Run validate CLI smoke test
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_validate.py

  # ── Opt-in: the ONE job that exercises the real model ──────────────────────
  # Hosted GitHub runners have no GPU and cannot run qwen2.5-coder:7b, so this is
  # NOT part of the default PR gate. It runs only on manual dispatch and requires a
  # self-hosted runner labelled [self-hosted, gpu] with Ollama + the model present.
  # Without such a runner the job simply stays queued/never starts — it never gives
  # a false green. This is the honest CI answer to "is the core generate path tested
  # end-to-end?": yes, here, on real hardware — not faked on a CPU runner.
  live-llm-generate:
    name: Live LLM Generate (self-hosted GPU, opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pydantic==2.7.1 requests

      - name: Verify or Pull Ollama model
        run: |
          if ! curl -fsS http://localhost:11434/api/tags | grep -q "qwen2.5-coder"; then
            echo "qwen2.5-coder model not found, attempting to pull..."
            ollama pull qwen2.5-coder:7b || true
          fi

      - name: Run live generate smoke (real model -> compilable test)
        env:
          CHERENKOV_LIVE_LLM: "1"
        run: PYTHONPATH=. python3 tests/smoke/smoke_test_generate_live.py

  live-llm-github-models:
    name: Live LLM — GitHub Models (MVP Verify)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pydantic==2.7.1 requests
      - name: Verify GitHub Models provider round-trip
        env:
          CHERENKOV_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHERENKOV_EGRESS: github
          CHERENKOV_TIER_DEEP_PROVIDER: github
          CHERENKOV_TIER_SMALL_PROVIDER: github
          CHERENKOV_CERTIFICATION_ENABLED: "false"
        run: |
          cat << 'EOF' > test_github_models.py
          from cherenkov.substrate.router import SubstrateRouter
          from cherenkov.core.contracts import ReasoningRequest
          router = SubstrateRouter()
          req = ReasoningRequest(task="Reply with 'OK'", capability_tier="small")
          res = router.route(req)
          print(f"Success! Provider: {res.provider}, Response: {res.content}")
          EOF
          PYTHONPATH=. python3 test_github_models.py


  mobile-pipeline-unit:
    name: Mobile Pipeline Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mobile pipeline smoke test
        run: PYTHONPATH=. python3 tests/standalone/smoke_test_mobile.py

      - name: Run mobile pipeline unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_mobile_pipeline.py -v

  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: |
          curl -fsSL https://static.snyk.io/cli/latest/snyk-linux -o /usr/local/bin/snyk
          chmod +x /usr/local/bin/snyk
          snyk --version

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN not set — skipping scan"
            echo '{"vulnerabilities":[],"infrastructureAsCode":[],"code":[]}' > /tmp/snyk-report.json
          else
            snyk auth "$SNYK_TOKEN" >/dev/null 2>&1 || { echo "WARNING: snyk auth failed — token may be invalid"; }
            snyk test --json > /tmp/snyk-report.json 2>&1 || SNYK_EXIT=$?
            # Exit code 1 = vulnerabilities found (expected), other codes = scan failure
            if [ -n "$SNYK_EXIT" ] && [ "$SNYK_EXIT" -ne 0 ] && [ "$SNYK_EXIT" -ne 1 ]; then
                echo "ERROR: snyk scan failed with exit code $SNYK_EXIT — treating as scan failure"
                exit 1
            fi
            # If snyk test produced an error message, write empty report
            if ! head -1 /tmp/snyk-report.json | grep -q '^{'; then
              echo '{"vulnerabilities":[],"infrastructureAsCode":[],"code":[]}' > /tmp/snyk-report.json
            fi
          fi

      - name: Parse and write findings
        run: |
          PYTHONPATH=. python3 -m cherenkov.security.snyk_bridge /tmp/snyk-report.json

      - name: Check for critical/high vulnerabilities
        run: |
          CRIT_HIGH=$(python3 -c "import json; d=json.load(open('/tmp/snyk-report.json')); print(sum(1 for v in d.get('vulnerabilities',[]) if v.get('severity','').lower() in ('critical','high')))" 2>/dev/null || echo "0")
          if [ "$CRIT_HIGH" -gt 0 ] && [ "$CRIT_HIGH" != "0" ]; then
            echo "FATAL: $CRIT_HIGH critical/high severity vulnerabilities found. Blocking merge."
            echo "Review Snyk report before merging."
            exit 1
          else
            echo "Security gate passed: no critical/high vulnerabilities found."
          fi

      - name: Upload Snyk report
        uses: actions/upload-artifact@v7
        with:
          name: snyk-report
          path: /tmp/snyk-report.json
        if: always()

  docs-parity:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check CLI Docs Parity
        run: python3 scripts/check_cli_docs.py

  sandbox-provider-unit:
    name: Sandbox Provider Unit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run sandbox provider unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_sandbox_providers.py

  policy-engine-unit:
    name: MCP Policy Engine Unit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run policy engine unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_mcp_policy.py

  model-runner-unit:
    name: Model Runner Adapter Unit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run model runner unit tests
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_model_runner_client.py

  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  sandbox-heal-docker:
    name: Sandbox Heal Docker (opt-in)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Docker MCP image
        run: docker build -t cherenkov-mcp:ci -f Dockerfile.mcp .
      - name: Run sandbox smoke with Docker provider
        run: PYTHONPATH=. python3 -m unittest tests/standalone/test_sandbox_providers.py -k TestDockerSandboxProvider
