name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        type: string
      title:
        description: "Release title"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python3 - <<'PYEOF'
          import re, sys

          tag = "${{ inputs.tag }}"
          # Strip leading 'v' for CHANGELOG lookup (e.g. v1.0.0 → 1.0.0)
          version = tag.lstrip("v")

          with open("CHANGELOG.md") as f:
              content = f.read()

          # Find the section for this version
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## |\Z)"
          match = re.search(pattern, content, re.DOTALL)

          if match:
              notes = match.group(0).strip()
          else:
              notes = f"Release {tag}\n\nSee [CHANGELOG.md](CHANGELOG.md) for full details."

          # Write to file for next step
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)

          print(f"Extracted {len(notes)} chars of release notes for {tag}")
          PYEOF

      - name: Create tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ inputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "${{ inputs.title }}"
          body_path: /tmp/release_notes.md
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
