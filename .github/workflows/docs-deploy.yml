name: Deploy Docs

# Deploys public MkDocs site to GitHub Pages via mike versioning.
# - Push to main  → deploys as "dev" alias
# - GitHub Release → deploys as versioned (e.g. "1.1") + "latest" alias
#
# Internal SSOT docs (docs/HANDOVER.md, docs/PHASE_PLAN.md, etc.)
# are NOT published — only docs-site/docs/ is the public source.

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - 'CHANGELOG.md'
      - 'docs/RELEASE_NOTES_*.md'
      - '.github/workflows/docs-deploy.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version alias to deploy (e.g. 1.1, dev)"
        required: false
        default: "dev"

permissions:
  contents: write   # mike needs to push to gh-pages branch
  pages: write
  id-token: write

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel — mike deploys are sequential

jobs:
  # ── 1. Lint & Build Validation ────────────────────────────────────────────
  docs-lint:
    name: Lint & Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for git-revision-date-localized plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs-site/docs-requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs-site/docs-requirements.txt

      - name: Auto-generate CLI reference from cherenkov --help
        run: python scripts/gen_cli_reference.py
        # Note: If cherenkov is not installed, the script produces a fallback message.
        # In CI, install it first if needed: pip install -e .
        continue-on-error: true

      - name: Validate public docs for leaked internal tokens
        run: python scripts/check_public_docs_clean.py

      - name: Build docs (strict — fail on broken links or missing pages)
        run: mkdocs build --strict --config-file docs-site/mkdocs.yml

      - name: Upload built site (for manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-build
          path: docs-site/site/
          retention-days: 7

  # ── 2. Deploy dev (main branch pushes) ───────────────────────────────────
  docs-deploy-dev:
    name: Deploy dev docs
    needs: docs-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs-site/docs-requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs-site/docs-requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev alias
        working-directory: docs-site
        run: mike deploy --push dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Deploy versioned release ──────────────────────────────────────────
  docs-deploy-release:
    name: Deploy versioned docs (${{ github.ref_name }})
    needs: docs-lint
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs-site/docs-requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs-site/docs-requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract major.minor version from tag (e.g. v1.1.0 → 1.1)
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1,2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying docs version: $VERSION"

      - name: Deploy versioned docs and update latest alias
        working-directory: docs-site
        run: |
          mike deploy --push --update-aliases ${{ steps.ver.outputs.version }} latest
          mike set-default --push latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show deployed versions
        working-directory: docs-site
        run: mike list
