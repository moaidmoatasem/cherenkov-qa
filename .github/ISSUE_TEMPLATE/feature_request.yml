name: "Feature Request"
description: "Suggest something new or an improvement to an existing feature."
title: "feat: <what you want, one line>"
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** check the [Roadmap](https://github.com/moaidmoatasem/cherenkov-qa/blob/main/docs/wiki/Roadmap.md) — it might already be planned.

        Feature requests that include a concrete use case and are in scope get prioritised faster.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the concrete situation where you hit this limitation.
      placeholder: |
        When I run `cherenkov validate` against a GraphQL API, it fails immediately
        because there is no OpenAPI spec. I have to convert the GraphQL schema manually,
        which takes 30 minutes per API.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
      description: Describe your ideal solution. Don't worry about implementation details.
      placeholder: |
        CHERENKOV should be able to read a GraphQL introspection schema directly
        and generate equivalent conformance tests.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      placeholder: |
        - Manually convert GraphQL schema to OpenAPI using graphql-to-openapi (works but tedious)
        - Use Postman collection as input (doesn't catch conformance drift)

  - type: dropdown
    id: area
    attributes:
      label: Which area of CHERENKOV does this affect?
      options:
        - "Core pipeline (ingest / plan / generate / review / validate)"
        - "Eject (standalone test output)"
        - "Healing (failure diagnosis)"
        - "CLI / UX"
        - "React dashboard"
        - "LLM / AI substrate"
        - "Mobile testing"
        - "K8s operator"
        - "MCP integration"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have — would use it if it existed"
        - "Important — currently working around it"
        - "Blocking — cannot use CHERENKOV without this"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, API spec examples, anything that helps illustrate the request.
