openapi: 3.1.0
info:
  title: Test API 3.1
  version: 1.0.0
paths:
  /users:
    post:
      summary: Create a user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Created
webhooks:
  newPet:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetWebhook'
      responses:
        '200':
          description: Return a 200 status to indicate that the data was received successfully

components:
  schemas:
    User:
      type: object
      properties:
        name:
          type: ["string", "null"]
          maxLength: 50
        age:
          type: ["integer", "null"]
          maximum: 150
        email:
          type: string
        address:
          type: string
    PetWebhook:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
