openapi: "3.1.0"
info:
  title: Simple CRUD API
  version: "1.0.0"
  description: Minimal golden spec for Cherenkov eval harness.

paths:
  /users:
    post:
      summary: Create a new user
      description: >
        Creates a user account. The email must be a valid RFC 5322 address.
        The password must be at least 8 characters long.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /users/{id}:
    get:
      summary: Get user by ID
      description: Returns a single user. Returns 404 if the user does not exist.
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "usr_abc123"
          description: The user identifier. Must match pattern usr_[a-z0-9]+.
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Unauthorized
        "404":
          description: User not found

  /items:
    get:
      summary: List items
      description: Returns a paginated list. The limit must be between 1 and 100.
      operationId: listItems
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 10
      responses:
        "200":
          description: Item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  total:
                    type: integer
        "401":
          description: Unauthorized

components:
  schemas:
    CreateUser:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
          description: Must be a valid RFC 5322 email address.
        password:
          type: string
          minLength: 8
          example: "secure123"
          description: Must be at least 8 characters long.
        name:
          type: string
          maxLength: 100
          example: "Alice Smith"

    User:
      type: object
      properties:
        id:
          type: string
          example: "usr_abc123"
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time

    Item:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          minimum: 0
