apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: conformancechecks.validation.cherenkov.io
spec:
  group: validation.cherenkov.io
  names:
    kind: ConformanceCheck
    listKind: ConformanceCheckList
    plural: conformancechecks
    singular: conformancecheck
    shortNames:
      - cck
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetRef
              properties:
                targetRef:
                  type: object
                  required:
                    - apiVersion
                    - kind
                    - name
                    - namespace
                    - port
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    port:
                      type: integer
                specRef:
                  type: string
                deviceTarget:
                  type: string
                llmConcurrency:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 16
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Pass
                    - Fail
                    - Error
                result:
                  type: object
                  properties:
                    passed:
                      type: boolean
                    summary:
                      type: string
                    divergences:
                      type: array
                      items:
                        type: string
                lastRun:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
