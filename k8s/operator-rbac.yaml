apiVersion: v1
kind: ServiceAccount
metadata:
  name: cherenkov-operator
  namespace: cherenkov
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cherenkov-operator
rules:
  - apiGroups: ["validation.cherenkov.io"]
    resources: ["conformancechecks", "conformancechecks/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "configmaps", "events"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cherenkov-operator
subjects:
  - kind: ServiceAccount
    name: cherenkov-operator
    namespace: cherenkov
roleRef:
  kind: ClusterRole
  name: cherenkov-operator
  apiGroup: rbac.authorization.k8s.io
